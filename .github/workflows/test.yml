name: Test and Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
        shell: bash

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: ${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  build-all:
    name: Build All Platforms
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build for all platforms
        run: |
          # Linux
          GOOS=linux GOARCH=amd64 go build -o skill_linux_amd64 ./cmd/skill
          GOOS=linux GOARCH=arm64 go build -o skill_linux_arm64 ./cmd/skill
          
          # macOS
          GOOS=darwin GOARCH=amd64 go build -o skill_darwin_amd64 ./cmd/skill
          GOOS=darwin GOARCH=arm64 go build -o skill_darwin_arm64 ./cmd/skill
          
          # Windows
          GOOS=windows GOARCH=amd64 go build -o skill_windows_amd64.exe ./cmd/skill
          GOOS=windows GOARCH=arm64 go build -o skill_windows_arm64.exe ./cmd/skill
          
          echo "✅ All builds successful!"
