name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            artifact_name: skill_linux_amd64
          - os: ubuntu-latest
            arch: arm64
            artifact_name: skill_linux_arm64
          - os: macos-latest
            arch: amd64
            artifact_name: skill_darwin_amd64
          - os: macos-latest
            arch: arm64
            artifact_name: skill_darwin_arm64
          - os: windows-latest
            arch: amd64
            artifact_name: skill_windows_amd64.exe
          - os: windows-latest
            arch: arm64
            artifact_name: skill_windows_arm64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Build binary
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ${{ matrix.artifact_name }} ./cmd/skill
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skill_*
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum skill_* > checksums.txt
          cat checksums.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## Installation
            
            ### Mac/Linux (One-line install)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Safclaw/skill/main/scripts/install.sh | bash
            ```
            
            ### Windows (PowerShell)
            ```powershell
            Invoke-WebRequest -UseBasicParsing https://raw.githubusercontent.com/Safclaw/skill/main/scripts/install.ps1 | Invoke-Expression
            ```
            
            ### Manual installation
            Download the binary for your platform and add it to your PATH.
            
            ## Checksums
            ```
            $(cat checksums.txt)
            ```
          files: |
            skill_*
            checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          generate_release_notes: true
